name: Scraper Farmacias de Guardia

on:
  schedule:
    - cron: '0 4,12,20 * * *'     # 06:00, 14:00, 22:00 hora España (CEST)
  workflow_dispatch:                # permite lanzar manualmente

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Puppeteer
        run: npm install puppeteer@^21

      - name: Ejecutar scraper
        run: node scraper-runner.js

      - name: Publicar en Gist
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gist_id: ${{ secrets.GIST_ID }}
          file_path: guardias-output.json
          file_type: text
